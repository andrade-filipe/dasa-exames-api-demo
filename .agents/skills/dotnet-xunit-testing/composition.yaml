benchmark_configuration:
  targets_scenarios: []   # draft-incomplete — pending a test-generation / test-quality scenario seed

constants_compliance:
  - constant: deterministic-outer-loop
    rationale: >
      Determinism is the skill's load-bearing claim: no wall-clock, no unseeded random, no live
      network/DB in a unit test. This is the test-artifact analog of a deterministic loop — a test's
      verdict must be a function of the code, not of when or where it ran. The "Nondeterministic
      test" anti-pattern names the failure directly, tied to the health/diagnostics correctness need.
    b1_verdict: passing
  - constant: minimal-sufficient-context
    rationale: >
      The skill is deliberately thin: it supplies only xUnit mechanics and defers test-design
      judgment to the named agnostic testing skills rather than duplicating them. Staying thin and
      composing-by-name keeps the deployed context minimal-sufficient and avoids the bloat of a
      restated testing tome. It also refuses to bake in framework-version / DI / layout assumptions,
      reading them from the codebase instead.
    b1_verdict: passing
  - constant: typed-tool-contracts-with-feedback-loop
    rationale: >
      Honored at the design level: the skill treats a test as the feedback loop on a unit's contract
      — assert on the typed contract (exception type, awaited result), not on incidental wording;
      "test your logic and its contracts, trust the framework's" makes the contract boundary explicit.
      This is a prompt-scaffold skill invoking zero tools, so the agent-tier structural assertion is
      vacuously honored; substantively honored via the contract-testing guidance.
    b1_verdict: passing
  secondary_constants:
    - prefer-stateless-reducer-shape   # mockless/functional-core guidance favors pure-function units with externalized state — directly testable

marketplace_metadata:
  audience: developer
  discovery:
