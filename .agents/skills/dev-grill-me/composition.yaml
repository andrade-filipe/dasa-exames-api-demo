# The developer-facing SKILL.md carries the lean frontmatter; this file carries the rest.

skill_name: dev-grill-me
emitted_at: "2026-07-01"
emitted_by: generator
node: catalog/projects/dasa

provenance:
  source_technique: null   # no socratic/elicitation technique exists under framework/techniques/
  adapted_from: operator-skill:grill-me
  technique_tier: technique
  notes: >
    No socratic-elicitation / one-question-at-a-time technique exists under framework/techniques/
    at emission time. This skill is adapted from the existing operator-facing grill-me skill and
    reframed for a developer writing a coding task on a .NET/C# codebase (name the service/project,
    the files, the goal, the constraints, and the verification). The absence of a formalized
    technique is recorded as an EMISSION_GAP below; provenance is adapted-from-operator-skill rather
    than a framework/techniques/ source until the technique is formalized.
  closest_framework_technique: framework/techniques/plan-then-execute.md   # tangential: forces specificity before action, but not the one-question-at-a-time elicitation pattern
  source_refs_read:
    - framework/techniques/plan-then-execute.md
    - framework/constants/minimal-sufficient-context.md
