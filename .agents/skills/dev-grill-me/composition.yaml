framework_classification:
  tier: technique
  task_class: decision-coherent   # driving one vague request to a specific task is a coherence
                                  # elicitation decision, not a parallel fan-out
  skill_contract: technique-evaluable
  effort_level: low
  concern_layer: context
  # [needs-architect-review] Two open items: (1) targets_scenarios empty — no elicitation scenario
  # exists; (2) source_technique null — no socratic-elicitation technique exists under
  # framework/techniques/, so provenance is adapted-from-operator-skill. Both surfaced in
  # stage5_observation. Marked draft-incomplete on targets_scenarios only.

benchmark_configuration:
  targets_scenarios: []   # draft-incomplete — pending a prompt-specificity / elicitation scenario seed

constants_compliance:
  - constant: minimal-sufficient-context
    rationale: >
      The skill's entire purpose is to raise the input signal so the assistant acts on a
      minimal-sufficient, high-specificity task rather than a vague one. Grilling to name files,
      goal, constraints, and verification is the elicitation-side realization of getting the
      right context in before action.
    b1_verdict: passing
  - constant: human-approval-on-irreversible-actions
    rationale: >
      By blocking action until the task is specific and agreed, the skill inserts a human
      checkpoint before any code change begins — the developer confirms the goal and acceptance
      criteria before edits land. Honored at the interaction level.
    b1_verdict: passing
  - constant: deterministic-outer-loop
    rationale: >
      The interview has a deterministic stop predicate: continue asking while files/goal/
      constraints/verification are unresolved; stop once all four are pinned. Termination is a
      structural sufficiency check, not an open-ended model whim. The "grill past sufficiency"
      anti-pattern names the failure to terminate.
    b1_verdict: passing
  secondary_constants:
    - prefer-stateless-reducer-shape   # the interview state (which axes resolved) can be reconstructed from the transcript; no hidden in-memory state

marketplace_metadata:
  audience: developer
  discovery:
    keywords:
      - meta-tooling    # improves how the developer drives the assistant
      - productivity    # prevents wasted work on a misread task

